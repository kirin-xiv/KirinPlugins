name: Update Download Counts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update FFToD download count
        run: |
          TOTAL=0
          RELEASES=$(curl -s https://api.github.com/repos/kirin-xiv/OpenToD/releases)
          for count in $(echo "$RELEASES" | jq -r '.[].assets[]?.download_count // 0'); do
            TOTAL=$((TOTAL + count))
          done
          echo "FFToD total downloads across all releases: $TOTAL"
          
          # Update pluginmaster.json
          jq --arg count "$TOTAL" \
            '(.[] | select(.InternalName == "FFToD") | .DownloadCount) = ($count | tonumber)' \
            pluginmaster.json > tmp.json && mv tmp.json pluginmaster.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git diff --staged --quiet || git commit -m "Update FFToD download count"
          git push
